name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Clean and regenerate Android project (V2)
        run: |
          # 1. 彻底删除旧的 android 文件夹（消除所有 v1 残留）
          rm -rf android/

          # 2. 用 Flutter 重新生成标准的 V2 安卓项目
          flutter create --platforms=android .

          # 3. 覆盖 app/build.gradle（强制 namespace 和 minSdk）
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          android {
              namespace "com.example.fall_heart"
              compileSdk 34

              defaultConfig {
                  applicationId "com.example.fall_heart"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }

          flutter {
              source "../.."
          }
          EOF

          # 4. 可选：如果 gradle 版本不兼容，可覆盖 settings.gradle 降级 AGP
          # 但暂时不覆盖，先试试默认生成的。

      - name: Build APK
        run: |
          flutter build apk --debug --no-version-check

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fall-heart-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
