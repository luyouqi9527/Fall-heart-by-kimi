workflows:
  default-workflow:
    name: Default Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: 彻底铲除旧安卓配置，自动重生V2
        script: |
          rm -rf android
          flutter create --platforms=android .
      - name: 构建调试APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
